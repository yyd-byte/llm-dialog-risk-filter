# 广告引流规则
category: advertising
label: "广告引流"
description: "检测广告推广、联系方式引流、重复营销话术等违规内容"

rules:
  # === 关键词规则 ===
  - id: ad-kw-001
    pattern: "加我微信"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "微信号引流"

  - id: ad-kw-002
    pattern: "加微信"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "微信号引流"

  - id: ad-kw-003
    pattern: "微信号"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "微信号引流"

  - id: ad-kw-004
    pattern: "加QQ"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "QQ号引流"

  - id: ad-kw-005
    pattern: "QQ群"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "QQ群引流"

  - id: ad-kw-006
    pattern: "加群"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "群组引流"

  - id: ad-kw-007
    pattern: "扫码"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "二维码引流"

  - id: ad-kw-008
    pattern: "二维码"
    pattern_type: keyword
    risk_level: low
    enabled: true
    description: "二维码提及"

  - id: ad-kw-009
    pattern: "点击链接"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "外部链接引流"

  - id: ad-kw-010
    pattern: "私聊"
    pattern_type: keyword
    risk_level: low
    enabled: true
    description: "私聊引流"

  - id: ad-kw-011
    pattern: "加好友"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "好友引流"

  - id: ad-kw-012
    pattern: "免费领取"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "营销诱导"

  - id: ad-kw-013
    pattern: "限时优惠"
    pattern_type: keyword
    risk_level: low
    enabled: true
    description: "营销话术"

  - id: ad-kw-014
    pattern: "点击领取"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "诱导点击"

  - id: ad-kw-015
    pattern: "关注公众号"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "公众号引流"

  - id: ad-kw-016
    pattern: "加我QQ"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "QQ号引流"

  - id: ad-kw-017
    pattern: "手机号"
    pattern_type: keyword
    risk_level: low
    enabled: true
    description: "手机号提及"

  - id: ad-kw-018
    pattern: "抖音号"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "抖音引流"

  - id: ad-kw-019
    pattern: "快手号"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "快手引流"

  - id: ad-kw-020
    pattern: "刷单"
    pattern_type: keyword
    risk_level: high
    enabled: true
    description: "刷单诈骗"

  - id: ad-kw-021
    pattern: "兼职日结"
    pattern_type: keyword
    risk_level: high
    enabled: true
    description: "兼职诈骗引流"

  - id: ad-kw-022
    pattern: "加V"
    pattern_type: keyword
    risk_level: medium
    enabled: true
    description: "微信号变体"

  - id: ad-kw-023
    pattern: "私信我"
    pattern_type: keyword
    risk_level: low
    enabled: true
    description: "私信引流"

  # === 正则规则 ===
  - id: ad-re-001
    pattern: '1[3-9]\d{9}'
    pattern_type: regex
    risk_level: medium
    enabled: true
    description: "中国大陆手机号"

  - id: ad-re-002
    pattern: 'https?://\S+'
    pattern_type: regex
    risk_level: medium
    enabled: true
    description: "外部URL链接"

  - id: ad-re-003
    pattern: '[vV]\s*[:：]?\s*\S{3,}'
    pattern_type: regex
    risk_level: medium
    enabled: true
    description: "V:xxx 微信号变体"

  - id: ad-re-004
    pattern: '[qQ]{2}\s*[:：]?\s*\d{5,}'
    pattern_type: regex
    risk_level: medium
    enabled: true
    description: "QQ号变体"

  - id: ad-re-005
    pattern: '加\s*我?\s*[vVwW]\s*信'
    pattern_type: regex
    risk_level: medium
    enabled: true
    description: "加V信/加微信 空格变体"

  - id: ad-re-006
    pattern: '\d\s+\d\s+\d\s+\d\s+\d'
    pattern_type: regex
    risk_level: medium
    enabled: true
    description: "数字间空格分隔（疑似手机号变体）"

  - id: ad-re-007
    pattern: '(?:添加|加|留).{0,5}(?:微信|v信|V信|qq|QQ)'
    pattern_type: regex
    risk_level: medium
    enabled: true
    description: "添加/加...微信 中间插入修饰词变体"