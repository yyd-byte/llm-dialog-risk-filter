category: advertising
label: 广告引流
description: 检测广告推广、联系方式引流、重复营销话术等违规内容
rules:
- id: ad-re-001
  pattern: 1[3-9]\d{9}
  pattern_type: regex
  risk_level: medium
  enabled: true
  description: 中国大陆手机号
- id: ad-re-002
  pattern: https?://\S+
  pattern_type: regex
  risk_level: medium
  enabled: true
  description: 外部URL链接
- id: ad-re-003
  pattern: '[vV]\s*[:：]?\s*\S{3,}'
  pattern_type: regex
  risk_level: medium
  enabled: true
  description: V:xxx 微信号变体
- id: ad-re-004
  pattern: '[qQ]{2}\s*[:：]?\s*\d{5,}'
  pattern_type: regex
  risk_level: medium
  enabled: true
  description: QQ号变体
- id: ad-re-005
  pattern: 加\s*我?\s*[vVwW]\s*信
  pattern_type: regex
  risk_level: medium
  enabled: true
  description: 加V信/加微信 空格变体
- id: ad-re-006
  pattern: \d\s+\d\s+\d\s+\d\s+\d
  pattern_type: regex
  risk_level: medium
  enabled: true
  description: 数字间空格分隔（疑似手机号变体）
- id: ad-re-007
  pattern: (?:添加|加|留).{0,5}(?:微信|v信|V信|qq|QQ)
  pattern_type: regex
  risk_level: medium
  enabled: true
  description: 添加/加...微信 中间插入修饰词变体
