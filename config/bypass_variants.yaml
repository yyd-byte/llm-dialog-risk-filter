# =============================================================================
# 中文绕过变体映射表（短语级）
# 将谐音、形近字、拼音、符号变体等绕过形式还原为标准形式
# 格式: "绕过形式": "标准形式"
#
# ⚠️ 匹配规则：子串匹配。因此所有条目必须是多字符短语。
#    单字符或过短的 ASCII 条目会误伤正常字母数字文本（如 abc123）。
#    添加新条目时，确保不会被误匹配到正常文本中。
#
# 分类依据: ToxiCloakCN / PCR-ToxiCN 四分类法
#   HR = 汉字替换（谐音/形近）  AR = 字母替换（拼音/缩写）
#   NR = 数字替换              MR = 混合替换
# =============================================================================

