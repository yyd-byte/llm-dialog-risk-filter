# =============================================================================
# 中文混淆字映射表（字符级单字替换）
# 将形近字、同音字等绕过写法还原为标准形式
# 格式: "混淆字": "标准字"
#
# ⚠️ 字符级替换是全局生效的，会同时影响检测阶段的规则匹配。
#    只添加在敏感词上下文中高度确定的替换对，避免误伤正常文本。
#
# 修改后重启服务即可生效
# =============================================================================

# === 同音字：脏话/辱骂类（高置信度） ===
草: 操        # 草你妈 → 操你妈（"草"在骂人语境中几乎全是"操"的谐音）
艹: 操        # 艹你妈 → 操你妈
尼: 你        # 尼玛 → 你妈
玛: 妈        # 尼玛 → 你妈
码: 妈        # 码的 → 妈的
碧: 逼        # 碧莲 → 逼脸 / 牛碧 → 牛逼
煞: 傻        # 煞笔 → 傻逼
沙: 傻        # 沙雕 → 傻屌
叼: 屌        # 沙叼 → 傻屌
吊: 屌        # 傻吊 → 傻屌
曰: 日        # 狗曰 → 狗日
婊: 婊        # 表子 → 婊子（"表"正常用字太多，不映射）

# === 同音字：联系方式/广告类（高置信度） ===
薇: 微        # 薇信 → 微信（"薇"日常极少使用，高度确定）

# === 同音字：赌博类 ===
堵: 赌        # 堵博 → 赌博（"堵住"语境不会触发敏感规则，无副作用）

# === 形近字（仅限极高相似度、日常易混的字对） ===
已: 己        # 已所不欲 → 己所不欲（"已"也是常用字但有"已经"义，"己→已"不作反向映射）
侯: 候        # 时侯 → 时候
燥: 躁        # 烦燥 → 烦躁
蓝: 篮        # 蓝球 → 篮球

# === 以下是有意不收录的 ===
# 人/入 — "人"是高频字，误伤面太大
# 干/千 — 两字都是高频常见字
# 末/未 — 两字都是高频常见字
# 四/死 — 数字"四"高频使用
# 读/赌 — "读"的高频用法(读书)远多于绕过用法
# 信→薇的反向映射 — "信"是极高频字，不能全局替换
