# =============================================================================
# LLM Dialog Risk Filter — Default Configuration
# =============================================================================

# --- Text Normalization ---
normalizer:
  lowercase: true
  full_to_half: true              # 全角 → 半角
  normalize_whitespace: true      # 合并异常空格
  reduce_repeated_chars: true     # 压缩重复字符
  max_repeat: 3                   # 重复字符最大保留次数
  normalize_symbols: true         # 变体符号标准化
  strip_evasion_separators: true  # 剥离绕过分隔符（/ | - 等）
  normalize_confusable_chars: true # 混淆字还原（形近字/同音字）
  normalize_pinyin: true           # 拼音感知绕过检测（需 pypinyin）
  normalize_traditional: true      # 繁 → 简（来自 funNLP 繁简体转换词库）
  normalize_abbreviations: true    # 缩写展开（来自 funNLP 中文缩写库）
  normalize_decomposition: true    # 拆字还原 Path B（来自 funNLP 拆字词库）

# --- Rule Detection ---
rule_detection:
  enabled: true
  # 规则文件目录（相对于项目根目录）
  rules_dir: "config/rules"

# --- Semantic Detection ---
semantic_detection:
  enabled: true
  # 模式: "local" 使用本地模型 | "api" 使用云端 Embedding API
  mode: "local"
  # 本地模型（mode=local 时生效）
  model_name: "BAAI/bge-small-zh-v1.5"
  # 是否使用 GPU
  device: "cpu"
  # 云端 API（mode=api 时生效）
  api:
    # SiliconFlow 免费额度，OpenAI 兼容
    provider: "siliconflow"
    base_url: "https://api.siliconflow.cn/v1"
    model: "BAAI/bge-large-zh-v1.5"
    api_key: ""  # 通过环境变量 SILICONFLOW_API_KEY 设置
  # 相似度阈值：低于此值视为语义模型无法判断，回退到规则结果
  confidence_threshold: 0.6
  # 四类风险的参考描述，用于向量相似度匹配
  # 描述越具体，分类越准确；可按需调整措辞
  category_references:
    sexual: "色情内容、低俗表达、性暗示、性挑逗、不雅词汇、色情服务、裸体"
    violent: "暴力威胁、人身攻击、自残自杀、恐怖主义、危险行为、伤害他人、杀人"
    advertising: "广告推广、微信号引流、手机号、外部链接、刷屏营销、拉人加群、加微信"
    sensitive: "政治敏感、违法信息、谣言传播、破坏社会稳定、危害国家安全、反动"

# --- Risk Fusion ---
risk_fusion:
  # 高风险阈值：综合置信度 >= 此值 → HIGH
  high_threshold: 0.8
  # 中风险阈值：综合置信度 >= 此值 → MEDIUM
  medium_threshold: 0.4
  # 低于 medium_threshold → LOW
  # 规则命中权重（仅规则与语义在同一类别均有证据时使用）
  rule_weight: 0.5
  semantic_weight: 0.5
  # 单条规则的策略强度：低风险需多条独立信号才会升级
  rule_confidence:
    low: 0.2
    medium: 0.58
    high: 1.0

# --- Desensitization ---
desensitization:
  # 模式: "mask" = ***替换 | "semantic" = 类别标签替换 | "rewrite" = LLM 语义重写（推荐，安全）
  mode: "semantic"
  # mask 模式下的配置
  replacement_char: "*"
  keep_first_last: true
  # semantic 模式下的类别标签
  category_labels:
    sexual: "[不雅用语]"
    violent: "[暴力用语]"
    advertising: "[联系方式]"
    sensitive: "[敏感信息]"
  fallback_label: "[违规内容]"
  # rewrite 模式下的 LLM 重写提示词（mode=rewrite 时生效）
  rewrite_prompt: |
    改写以下文本。方括号（如 [联系方式]）标记了需要替换的敏感词。
    将每个方括号替换为一个简短的中性词，不要删除，不要改变其他内容。

    示例：
    - "加我[联系方式]" → "加我联系方式"（保留"加我"的意图，"联系方式"是中性替换）
    - "[不雅用语]吧" → "来聊聊吧"（中性替代）

    严格规则：
    1. 每个方括号必须被替换为一个中性词语，不能直接删除
    2. 替换后的句子应与原句意思一致（只是去除了不良性质）
    3. 不要添加建议、提醒或额外信息
    4. 只输出改写后的一句话

    文本：{text}
    改写：

# --- Output Check ---
output_check:
  enabled: true
  # 合规提示话术
  block_message: "抱歉，您的请求包含不适宜内容，无法处理。"
  output_block_message: "抱歉，系统在处理您的请求时生成了不适宜内容，已被安全拦截。"

# --- LLM Client ---
llm:
  # API 类型: "ollama" | "openai"
  provider: "openai"
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  api_key: ""  # 通过环境变量 DEEPSEEK_API_KEY 设置
  timeout: 30
  max_tokens: 2048

# --- Audit Logging ---
audit:
  enabled: true
  log_dir: "data/logs"
  # 日志文件轮转大小（MB）
  max_file_size_mb: 10
  # 保留最近 N 个日志文件
  backup_count: 5

# --- Dashboard ---
dashboard:
  title: "内容风控运营看板"
  port: 8501